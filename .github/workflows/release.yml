name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: universal (Intel + Apple Silicon в одном бинаре) — один .app.tar.gz для апдейтера, один DMG.
          - os: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version sync
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION package.json=$PKG_VERSION tauri.conf.json=$TAURI_VERSION"
            exit 1
          fi
          echo "Versions synced: $TAG_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
          TAURI_SIGNING_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CP-Helper ${{ github.ref_name }}
          args: --target ${{ matrix.target }}
          releaseBody: |
            ## Changes
            - See commits for details.
          releaseDraft: false
          prerelease: false

  # Зеркалим готовые билды в ПУБЛИЧНЫЙ dist-репо, чтобы авто-апдейтер работал,
  # пока исходный репозиторий приватный. В latest.json правим ссылки на dist-репо.
  mirror:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" -D out --clobber
          echo "Скачано:"; ls -la out
          # Не публикуем битый релиз: проверяем ключевые файлы и общий объём.
          test -f out/latest.json || { echo "::error::нет latest.json в исходном релизе"; exit 1; }
          N=$(ls -1 out | wc -l)
          if [ "$N" -lt 4 ]; then echo "::error::слишком мало ассетов ($N)"; exit 1; fi

      - name: Rewrite updater URLs (private -> dist)
        run: |
          # tauri-action кладёт в url API-ссылку по asset-id ИСХОДНОГО репо — в dist этот id
          # невалиден. Поэтому переписываем url на прямые browser-ссылки dist по имени файла.
          WIN_FILE=$(ls out | grep -E '_x64-setup\.exe$' | head -1)
          MAC_FILE=$(ls out | grep -E '\.app\.tar\.gz$' | head -1)
          echo "win: $WIN_FILE | mac: $MAC_FILE"
          test -n "$WIN_FILE" || { echo "::error::нет windows setup.exe"; exit 1; }
          test -n "$MAC_FILE" || echo "::warning::нет mac .app.tar.gz — mac-апдейт не заработает"
          BASE="https://github.com/se1dhe/cp-helper-dist/releases/download/${GITHUB_REF_NAME}"
          jq --arg win "$BASE/$WIN_FILE" --arg mac "$BASE/$MAC_FILE" '
            .platforms |= with_entries(
              .value.url = (
                if (.key|startswith("windows")) then $win
                elif (.key|startswith("darwin")) then $mac
                else .value.url end)
            )
          ' out/latest.json > out/latest.json.new && mv out/latest.json.new out/latest.json
          echo "--- latest.json ---"; cat out/latest.json
          if grep -q 'api.github.com' out/latest.json; then
            echo "::error::в latest.json остались api-ссылки"; exit 1
          fi

      - name: Publish builds to public dist repo
        env:
          GH_TOKEN: ${{ secrets.DIST_TOKEN }}
        run: |
          # Пересоздаём релиз целиком (delete+create), чтобы не оставалось частичных/битых
          # состояний, и явно помечаем --latest (все релизы на одном коммите main).
          gh release delete "${GITHUB_REF_NAME}" -R se1dhe/cp-helper-dist --yes --cleanup-tag 2>/dev/null || true
          sleep 3
          gh release create "${GITHUB_REF_NAME}" out/* \
            -R se1dhe/cp-helper-dist \
            -t "CP-Helper ${GITHUB_REF_NAME}" \
            --notes "Сборки CP-Helper ${GITHUB_REF_NAME}." \
            --latest
