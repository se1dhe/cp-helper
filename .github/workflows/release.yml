name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version sync
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION package.json=$PKG_VERSION tauri.conf.json=$TAURI_VERSION"
            exit 1
          fi
          echo "Versions synced: $TAG_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
          TAURI_SIGNING_PASSPHRASE: ${{ secrets.TAURI_KEY_PASSPHRASE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CP-Helper ${{ github.ref_name }}
          args: --target ${{ matrix.target }}
          releaseBody: |
            ## Changes
            - See commits for details.
          releaseDraft: false
          prerelease: false

  # Зеркалим готовые билды в ПУБЛИЧНЫЙ dist-репо, чтобы авто-апдейтер работал,
  # пока исходный репозиторий приватный. В latest.json правим ссылки на dist-репо.
  mirror:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets from private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          gh release download "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" -D out --clobber

      - name: Rewrite updater URLs (private -> dist)
        run: |
          if [ -f out/latest.json ]; then
            sed -i 's#/se1dhe/cp-helper/releases/#/se1dhe/cp-helper-dist/releases/#g' out/latest.json
            echo "--- latest.json ---"; cat out/latest.json
          else
            echo "latest.json не найден"; ls -la out
          fi

      - name: Publish builds to public dist repo
        env:
          GH_TOKEN: ${{ secrets.DIST_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/* \
            -R se1dhe/cp-helper-dist \
            -t "CP-Helper ${GITHUB_REF_NAME}" \
            --notes "Сборки CP-Helper ${GITHUB_REF_NAME}." \
          || gh release upload "${GITHUB_REF_NAME}" out/* -R se1dhe/cp-helper-dist --clobber
